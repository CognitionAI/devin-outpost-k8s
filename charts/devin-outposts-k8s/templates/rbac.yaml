{{- if .Values.rbac.create -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "devin-outposts-k8s.fullname" . }}
  labels:
    {{- include "devin-outposts-k8s.labels" . | nindent 4 }}
rules:
  # Reconcile the operator's own custom resources + status.
  - apiGroups: ["outposts.cognition.com"]
    resources: ["outpostpools", "outpostpools/status", "outpostpools/finalizers"]
    verbs: ["get", "list", "watch", "update", "patch"]
  # Manage one worker Pod per claimed session.
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch", "create", "delete", "patch"]
  # Read the per-pool token Secret; create/delete the per-session connect-token
  # Secrets injected into worker pods.
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch", "create", "delete"]
  # Persist the generated acceptor ID (when operator.acceptorId is unset).
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch", "create", "update"]
  # Leader election (planned; see the controller docs).
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "create", "update"]
  # Emit events for observability.
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
  # CR-soon nikhil: snapshot resources (e.g. snapshot.storage.k8s.io VolumeSnapshots,
  # GKE pod snapshots) once the snapshot providers are implemented.
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "devin-outposts-k8s.fullname" . }}
  labels:
    {{- include "devin-outposts-k8s.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "devin-outposts-k8s.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "devin-outposts-k8s.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
