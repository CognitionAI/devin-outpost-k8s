apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "outposts-operator.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "outposts-operator.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "outposts-operator.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "outposts-operator.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "outposts-operator.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: operator
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - --health-probe-bind-address=:{{ .Values.metrics.service.port }}
          env:
            - name: METRICS_ADDR
              value: ":{{ .Values.metrics.service.port }}"
            - name: WATCH_NAMESPACE
              value: {{ .Values.operator.watchNamespace | quote }}
            - name: DEVIN_API_URL
              value: {{ .Values.operator.defaultApiUrl | quote }}
            - name: LOG_FORMAT
              value: {{ .Values.operator.logFormat | quote }}
            - name: RUST_LOG
              value: {{ .Values.operator.logLevel | quote }}
          ports:
            - name: metrics
              containerPort: {{ .Values.metrics.service.port }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: metrics
          readinessProbe:
            httpGet:
              path: /readyz
              port: metrics
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
